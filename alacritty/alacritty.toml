[general]
ipc_socket = false
import = [ "colorscheme.toml" ]

[font]
normal = { family = "IosevkaCustomNerdFont" }
bold = { style = "SemiBold" }
size = 15.0

offset = { x = 1, y = 8 }
glyph_offset = { x = 0, y = 4 }

[window]
decorations_theme_variant = "Dark"
padding = { x = 8, y = 4 }

[mouse]
hide_when_typing = false

[selection]
save_to_clipboard = true

